id: stm32f407
name: STM32F407 Discovery / Nucleo
vendor: STMicroelectronics
core: cortex-m4f
architecture: armv7e-m
fpu: true
npu: false
memory:
  ram_kb: 192
  flash_kb: 1024
  ccm_kb: 64
inference:
  runtime: tflite-micro
  cmsis_nn: true
  arena_default_kb: 64
toolchain:
  compiler: arm-none-eabi-gcc
  flags: "-mcpu=cortex-m4 -mfpu=fpv4-sp-d16 -mfloat-abi=hard -mthumb"
rtos:
  freertos: true
  zephyr: true
notes: >
  192KB SRAM (112+16+64 CCM). Use CCM for TFLite arena.
  CMSIS-NN gives 5-10x speedup over naive inference.
